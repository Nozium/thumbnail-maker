<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>

  <!-- Three text lines (left side) -->
  <rect x="80" y="176" width="140" height="18" rx="9" fill="white" opacity="0.95"/>
  <rect x="80" y="216" width="110" height="18" rx="9" fill="white" opacity="0.7"/>
  <rect x="80" y="256" width="125" height="18" rx="9" fill="white" opacity="0.45"/>

  <!-- Mobile device frame (right side) -->
  <rect x="276" y="120" width="156" height="272" rx="24" ry="24" fill="white" opacity="0.15"/>
  <rect x="276" y="120" width="156" height="272" rx="24" ry="24" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>

  <!-- Screen area inside mobile -->
  <rect x="288" y="148" width="132" height="216" rx="8" fill="white" opacity="0.2"/>

  <!-- Notch / dynamic island -->
  <rect x="330" y="130" width="48" height="8" rx="4" fill="white" opacity="0.4"/>
</svg>
